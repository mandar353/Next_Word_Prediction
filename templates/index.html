<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Next Word Predictor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #74ebd5, #ACB6E5);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .card {
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      background-color: white;
      max-width: 500px;
      width: 100%;
    }
    .btn-custom {
      background-color: #4e73df;
      color: white;
      border: none;
      transition: all 0.3s ease;
    }
    .btn-custom:hover {
      background-color: #375ac0;
    }
    .result {
      font-weight: bold;
      font-size: 1.2rem;
      margin-top: 20px;
      color: #2f2f2f;
    }
  </style>
</head>
<body>

<div class="card">
  <h3 class="text-center mb-4">🧠 Next Word Prediction</h3>
  <form action="/predict" method="POST">
    <div class="mb-3">
      <label for="seed_text" class="form-label">Enter Seed Text</label>
      <input type="text" name="seed_text" class="form-control" id="seed_text" required placeholder="e.g., the tragedy of the">
    </div>
    <button type="submit" class="btn btn-custom w-100">Predict Next Word</button>
  </form>

  {% if next_word %}
  <div class="result text-center">
    <p>🔮 Predicted next word:</p>
    <h4><span class="badge bg-success">{{ next_word }}</span></h4>
  </div>
  {% endif %}
</div>

</body>
</html>
