<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Prediction Result</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #ffecd2, #fcb69f);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .card {
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      background-color: white;
      text-align: center;
      max-width: 500px;
      width: 100%;
    }
    .btn-home {
      margin-top: 20px;
      background-color: #d63384;
      color: white;
      border: none;
    }
    .btn-home:hover {
      background-color: #b02a6d;
    }
  </style>
</head>
<body>

<div class="card">
  <h3 class="mb-3">✨ Prediction Result</h3>
  <p class="mb-1">You entered:</p>
  <h5>"{{ seed_text }}"</h5>

  <p class="mt-4 mb-1">Predicted next word:</p>
  <h4><span class="badge bg-success">{{ next_word }}</span></h4>

  <a href="/" class="btn btn-home mt-4">🔙 Try Again</a>
</div>

</body>
</html>
